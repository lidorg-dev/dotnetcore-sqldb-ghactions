name: Build and deploy app

on:
  push:
  workflow_dispatch: 

# CONFIGURATION
# For help, go to https://github.com/Azure/Actions
#
# 1. Set up the following secrets in your repository:
#   AZURE_WEBAPP_PUBLISH_PROFILE
#
# 2. Change these variables for your configuration:
env:
  AZURE_WEBAPP_NAME: demo-webappsql-gh-actions    # set this to your application's name
  AZURE_WEBAPP_PACKAGE_PATH: '.'      # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '8.0'           # set this to the dot net version to use
  AZURE_RESOURCEGROUP_NAME: lidor-rg # set this to your preferred resource group name
  SQLSERVER_NAME: azure-lidor-sql-server                         # set this to your preferred sql server name
  DATABASE_NAME: db-app-test                   # set this to your preferred sql database name
  SQLADMIN_LOGIN: ${{ secrets.SQLADMIN_LOGIN  }}                # Create a secret in your Github repo for the SQL Admin login name you want to use
  SQLADMIN_PASS: ${{ secrets.SQLADMIN_PASS  }}                 # Create a secret in your Github repo for the SQL Admin password you want to use
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      # Checkout the repo
      - uses: actions/checkout@v4
      
      # Setup .NET Core SDK
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }} 

      - name: Setup .NET Core 3.1 for EF tooling
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '3.1.x'

      - name: dotnet restore
        run: dotnet restore

      # Run dotnet build and publish
      - name: dotnet build and publish
        run: |
          dotnet build --configuration Release
          dotnet publish -c Release -o myapp 

      - name: Login for az cli commands 
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: create db connection string
        run: |
          CONN_STR=$(az sql db show-connection-string --client ado.net --server ${{ env.SQLSERVER_NAME }} --name ${{ env.DATABASE_NAME }} -o tsv)
          CONN_STR=$(echo "$CONN_STR" | sed "s/<username>/${{ env.SQLADMIN_LOGIN }}/g")
          CONN_STR=$(echo "$CONN_STR" | sed "s/<password>/${{ env.SQLADMIN_PASS }}/g")
          echo "SQL_DB_CONN_STR=$CONN_STR" >> $GITHUB_ENV

      - name: Update Database
        run: |
          dotnet tool install --global dotnet-ef --version 3.1.3
          dotnet ef database update --no-build --project DotNetCoreSqlDb.csproj --startup-project DotNetCoreSqlDb.csproj
        env:
          DOTNET_ROLL_FORWARD: Major
          ConnectionStrings__MyDbConnection: ${{ env.SQL_DB_CONN_STR }}
          
      - name: Create deployment archive
        run: |
          cd myapp
          zip -r "$RUNNER_TEMP/webapp.zip" .

      # Deploy to Azure Web App using the publish profile directly
      - name: Deploy app using publish profile
        shell: pwsh
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          [xml]$publishProfileXml = $env:AZURE_WEBAPP_PUBLISH_PROFILE
          $publishProfile = @($publishProfileXml.publishData.publishProfile) |
            Where-Object { $_.publishMethod -in @('ZipDeploy', 'MSDeploy') } |
            Select-Object -First 1

          if (-not $publishProfile) {
            throw "No ZipDeploy/MSDeploy entry was found in AZURE_WEBAPP_PUBLISH_PROFILE."
          }

          $publishHost = ($publishProfile.publishUrl -replace '^https?://', '').Split('/')[0]
          $publishUser = $publishProfile.userName
          $publishPassword = $publishProfile.userPWD
          $packagePath = Join-Path $env:RUNNER_TEMP 'webapp.zip'

          if (-not (Test-Path $packagePath)) {
            throw "Deployment package not found at $packagePath."
          }

          $basicAuth = [Convert]::ToBase64String(
            [System.Text.Encoding]::ASCII.GetBytes("${publishUser}:${publishPassword}")
          )

          Invoke-WebRequest `
            -Uri "https://$publishHost/api/publish?type=zip" `
            -Method Post `
            -Headers @{ Authorization = "Basic $basicAuth" } `
            -InFile $packagePath `
            -ContentType "application/zip"



      
      # - name: Swap to production slot
      #   run: |
      #     az webapp deployment slot swap --resource-group ${{ env.AZURE_RESOURCEGROUP_NAME }} --name ${{ env.AZURE_WEBAPP_NAME }} --slot staging --target-slot production
      #     echo "Swap finished. App Service Application URL: https://$(az webapp show --resource-group ${{ env.AZURE_RESOURCEGROUP_NAME }} --name ${{ env.AZURE_WEBAPP_NAME }} --query hostNames[0] -o tsv)"

# For more samples to get started with GitHub Action workflows to deploy to Azure, refer to https://github.com/Azure/actions-workflow-samples
